<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REISHED — Ванильный Minecraft 26.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo"><div class="logo-cube"></div><span>REISHED</span></a>
            <nav class="nav">
                <a href="index.html" class="nav-link active">Главная</a>
                <a href="server.html" class="nav-link">Сервер</a>
                <a href="players.html" class="nav-link">Игроки</a>
                <a href="profile.html" class="nav-link">Профиль</a>
            </nav>
            <div class="header-right">
                <div class="clock" id="clock">--:--:--</div>
                <button class="theme-toggle" id="themeToggle" title="Сменить тему">🌓</button>
                <a href="auth.html" class="btn btn-primary" id="authBtn">Войти</a>
            </div>
        </div>
    </header>

    <main>
        <section class="hero container">
            <h1>REISHED — <span class="accent">честная ваниль</span> 26.2</h1>
            <p class="hero-sub">Работаем 24/7. Plasmo Voice, Brewery, уникальные датапаки и дружное сообщество. Никакого pay-to-win.</p>
            
            <div style="display: flex; gap: 12px; justify-content: center; margin-bottom: 60px; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="copyIP()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    reished.my-craft.cc
                </button>
                <a href="https://discord.gg/RZa2AQheQ4" target="_blank" class="btn btn-ghost">Discord сервер →</a>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="statOnline">0</div>
                    <div class="stat-label">Сейчас в игре</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statTotal">0</div>
                    <div class="stat-label">Всего игроков</div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <div>© 2026 REISHED. Версия 26.2</div>
            <div class="footer-links">
                <a href="https://discord.gg/RZa2AQheQ4" target="_blank">Discord</a>
                <a href="#" onclick="copyIP(); return false;">IP: reished.my-craft.cc</a>
            </div>
        </div>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
