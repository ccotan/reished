<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — REISHED</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-wrap {
            max-width: 440px; margin: 60px auto; padding: 40px;
            background: var(--bg-elev); border: 1px solid var(--border);
            border-radius: var(--radius); box-shadow: var(--shadow);
        }
        .auth-wrap h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
        .auth-sub { color: var(--text-soft); margin-bottom: 28px; font-size: 14px; }
        .form-field { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-soft); margin-bottom: 6px; }
        .form-input {
            width: 100%; padding: 12px 16px; background: var(--bg-soft);
            border: 1.5px solid var(--border); border-radius: 12px;
            color: var(--text); font-size: 14px; outline: none;
        }
        .form-input:focus { border-color: var(--accent-2); }
        .auth-switch { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-soft); }
        .auth-switch a { color: var(--accent-2); font-weight: 600; cursor: pointer; }
        .admin-hint {
            margin-top: 20px; padding: 12px; background: rgba(196,225,122,0.1);
            border: 1px solid var(--accent-2); border-radius: 12px;
            font-size: 12px; color: var(--accent-2); text-align: center;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <div class="logo-cube"></div>
                <span>REISHED</span>
            </a>
            <div class="header-right">
                <div class="clock" id="clock">--:--:--</div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="auth-wrap">
            <h2 id="authTitle">Вход в аккаунт</h2>
            <p class="auth-sub" id="authSub">Рады видеть тебя снова</p>

            <form id="authForm">
                <div class="form-field">
                    <label class="form-label">Никнейм</label>
                    <input type="text" class="form-input" id="username" required placeholder="Ваш игровой ник">
                </div>
                <div class="form-field">
                    <label class="form-label">Пароль</label>
                    <input type="password" class="form-input" id="password" required placeholder="••••••••">
                </div>
                <div id="emailField" class="form-field" style="display: none;">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="email" placeholder="you@example.com">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px; padding: 14px; justify-content: center;">
                    Войти
                </button>
            </form>

            <div class="auth-switch">
                <span id="authSwitchText">Нет аккаунта?</span>
                <a onclick="toggleAuthMode()">
                    <span id="authSwitchLink">Зарегистрироваться</span>
                </a>
            </div>

            <div class="admin-hint">
                🔑 Админ-аккаунт: логин <strong>Admin</strong>, пароль <strong>admin123</strong>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-copy">© 2026 REISHED. Ванильный Minecraft 26.2</div>
                <div class="footer-links">
                    <a href="https://discord.gg/RZa2AQheQ4" target="_blank">Discord</a>
                    <a href="#" onclick="copyIP(); return false">reished.my-craft.cc</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script>
        // Создаём админ-аккаунт при первом запуске
        (function initAdmin() {
            let players = JSON.parse(localStorage.getItem('reished_players') || '[]');
            
            // Проверяем, есть ли уже админ
            const adminExists = players.find(p => p.name === 'Admin');
            
            if (!adminExists) {
                const adminUser = {
                    id: 1,
                    name: 'Admin',
                    username: 'Admin',
                    email: 'admin@reished.ru',
                    password: 'admin123',
                    role: 'admin',
                    prefix: 'Основатель',
                    bio: 'Главный администратор сервера REISHED',
                    playtime: 999,
                    kills: 150,
                    brews: 42,
                    is_online: 0,
                    avatar: null,
                    cover: null,
                    banned: false
                };
                players.push(adminUser);
                localStorage.setItem('reished_players', JSON.stringify(players));
                console.log('✅ Админ-аккаунт создан: Admin / admin123');
            }
        })();

        let isLogin = true;

        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('authTitle').textContent = isLogin ? 'Вход в аккаунт' : 'Создать аккаунт';
            document.getElementById('authSub').textContent = isLogin ? 'Рады видеть тебя снова' : 'Присоединяйся к REISHED';
            document.querySelector('button[type="submit"]').textContent = isLogin ? 'Войти' : 'Зарегистрироваться';
            document.getElementById('authSwitchText').textContent = isLogin ? 'Нет аккаунта?' : 'Уже есть аккаунт?';
            document.getElementById('authSwitchLink').textContent = isLogin ? 'Зарегистрироваться' : 'Войти';
            document.getElementById('emailField').style.display = isLogin ? 'none' : 'flex';
        }

        document.getElementById('authForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (isLogin) {
                // Вход
                const users = JSON.parse(localStorage.getItem('reished_players') || '[]');
                const user = users.find(u => u.name === username);
                
                if (!user) {
                    showToast('error', 'Ошибка', 'Пользователь не найден');
                    return;
                }
                
                // Проверка пароля (для админа — admin123, для остальных — любой)
                if (user.name === 'Admin' && password !== 'admin123') {
                    showToast('error', 'Ошибка', 'Неверный пароль');
                    return;
                }
                
                localStorage.setItem('reished_user', JSON.stringify({
                    id: user.id,
                    username: user.name,
                    name: user.name,
                    role: user.role,
                    prefix: user.prefix,
                    bio: user.bio
                }));
                
                showToast('success', 'Добро пожаловать!', `Привет, ${username}`);
                
                // Если админ — показываем кнопку админки
                if (user.role === 'admin') {
                    setTimeout(() => window.location.href = 'admin-panel.html', 1000);
                } else {
                    setTimeout(() => window.location.href = 'profile.html', 1000);
                }
            } else {
                // Регистрация
                const email = document.getElementById('email').value.trim();
                const users = JSON.parse(localStorage.getItem('reished_players') || '[]');
                
                if (users.find(u => u.name === username)) {
                    showToast('error', 'Ошибка', 'Такой никнейм уже занят');
                    return;
                }
                
                const newUser = {
                    id: Date.now(),
                    name: username,
                    username: username,
                    email: email,
                    password: password,
                    role: 'player',
                    prefix: 'Игрок',
                    bio: '',
                    playtime: 0,
                    kills: 0,
                    brews: 0,
                    is_online: 0,
                    avatar: null,
                    cover: null,
                    banned: false
                };
                
                users.push(newUser);
                localStorage.setItem('reished_players', JSON.stringify(users));
                localStorage.setItem('reished_user', JSON.stringify({
                    id: newUser.id,
                    username: newUser.name,
                    name: newUser.name,
                    role: newUser.role,
                    prefix: newUser.prefix
                }));
                
                showToast('success', 'Аккаунт создан', 'Добро пожаловать на REISHED!');
                setTimeout(() => window.location.href = 'profile.html', 1000);
            }
        });
    </script>
</body>
</html>
