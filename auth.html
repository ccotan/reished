<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — REISHED</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container { max-width: 400px; margin: 80px auto; padding: 32px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-soft); margin-bottom: 6px; }
        .form-input { width: 100%; padding: 12px 16px; background: var(--bg-soft); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); font-size: 14px; outline: none; }
        .form-input:focus { border-color: var(--accent-2); }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo"><div class="logo-cube"></div><span>REISHED</span></a>
            <div class="header-right">
                <button class="theme-toggle" id="themeToggle">🌓</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="auth-container">
            <h2 style="margin-bottom: 24px; font-weight: 800;">Вход в аккаунт</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Никнейм</label>
                    <input type="text" class="form-input" id="username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <input type="password" class="form-input" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px; justify-content: center;">Войти</button>
            </form>
            <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-soft);">
                Нет аккаунта? <a href="#" style="color: var(--accent); font-weight: 600;">Зарегистрироваться</a>
            </p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Здесь позже будет fetch('/api/login')
            const username = document.getElementById('username').value;
            localStorage.setItem('reished_user', JSON.stringify({ username: username, role: 'player' }));
            window.location.href = 'profile.html';
        });
    </script>
</body>
</html>
