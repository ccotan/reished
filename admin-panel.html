<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — REISHED</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-header {
            background: linear-gradient(135deg, rgba(196,225,122,0.1) 0%, rgba(166,199,61,0.05) 100%);
            border: 1px solid var(--accent-2);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-header h1 { font-size: 24px; font-weight: 800; }
        .admin-header p { color: var(--text-soft); font-size: 14px; margin-top: 4px; }
        
        .admin-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
        .admin-tab {
            padding: 10px 20px; border-radius: 12px; font-weight: 600; font-size: 14px;
            background: var(--bg-soft); color: var(--text-soft); border: none; cursor: pointer;
            transition: all 0.3s ease;
        }
        .admin-tab.active { background: var(--accent-grad); color: #121212; }
        .admin-tab:hover:not(.active) { background: var(--border); }
        
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        
        .admin-table {
            background: var(--bg-elev); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden;
        }
        .admin-table table { width: 100%; border-collapse: collapse; }
        .admin-table th, .admin-table td {
            padding: 14px 20px; text-align: left; font-size: 14px;
            border-bottom: 1px solid var(--border);
        }
        .admin-table th {
            background: var(--bg-soft); font-weight: 600; font-size: 12px;
            text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-soft);
        }
        .admin-table tr:last-child td { border-bottom: none; }
        .admin-table tr:hover td { background: var(--bg-soft); }
        
        .admin-actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .btn-admin {
            padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
            border: none; cursor: pointer; transition: all 0.3s ease;
        }
        .btn-admin-primary { background: var(--accent-grad); color: #121212; }
        .btn-admin-danger { background: rgba(255,107,107,0.2); color: var(--danger); border: 1px solid var(--danger); }
        .btn-admin-success { background: rgba(76,175,80,0.2); color: var(--success); border: 1px solid var(--success); }
        .btn-admin:hover { transform: translateY(-1px); }
        
        .complaint-card {
            background: var(--bg-elev); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px; margin-bottom: 12px;
        }
        .complaint-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .complaint-reason {
            padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
            background: rgba(255,107,107,0.15); color: var(--danger);
        }
        .complaint-user { font-weight: 700; font-size: 15px; }
        .complaint-text { color: var(--text-soft); font-size: 14px; line-height: 1.6; }
        .complaint-date { font-size: 12px; color: var(--text-soft); margin-top: 12px; }
        .complaint-actions { display: flex; gap: 8px; margin-top: 16px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <div class="logo-cube"></div>
                <span>REISHED</span>
            </a>
            <nav class="nav">
                <a href="index.html" class="nav-link">Главная</a>
                <a href="players.html" class="nav-link">Игроки</a>
                <a href="profile.html" class="nav-link">Профиль</a>
                <a href="complaints.html" class="nav-link">Жалобы</a>
                <a href="admin-panel.html" class="nav-link active">Админка</a>
            </nav>
            <div class="header-right">
                <div class="clock" id="clock">--:--:--</div>
                <button class="btn btn-ghost" onclick="logout()">Выйти</button>
            </div>
        </div>
    </header>

    <main class="container section">
        <div class="admin-header">
            <div>
                <h1>👑 Админ-панель</h1>
                <p>Управление сервером REISHED</p>
            </div>
            <div style="text-align: right;">
                <div style="font-weight: 700;" id="adminName">Администратор</div>
                <div style="font-size: 13px; color: var(--text-soft);" id="adminPrefix">Основатель</div>
            </div>
        </div>

        <div class="admin-tabs">
            <button class="admin-tab active" onclick="switchTab('players')">👥 Игроки</button>
            <button class="admin-tab" onclick="switchTab('complaints')">⚠️ Жалобы</button>
            <button class="admin-tab" onclick="switchTab('stats')"> Статистика</button>
        </div>

        <!-- Вкладка Игроки -->
        <div class="admin-section active" id="tab-players">
            <div class="admin-table">
                <table>
                    <thead>
                        <tr>
                            <th>Игрок</th>
                            <th>Роль</th>
                            <th>Статус</th>
                            <th>Статистика</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="adminPlayersTable"></tbody>
                </table>
            </div>
        </div>

        <!-- Вкладка Жалобы -->
        <div class="admin-section" id="tab-complaints">
            <div id="complaintsList"></div>
        </div>

        <!-- Вкладка Статистика -->
        <div class="admin-section" id="tab-stats">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Всего игроков</div>
                    <div class="stat-value" id="statTotalPlayers">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Администраторов</div>
                    <div class="stat-value" id="statAdmins">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">VIP игроков</div>
                    <div class="stat-value" id="statVIPs">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Новых жалоб</div>
                    <div class="stat-value" id="statComplaints">0</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-copy">© 2026 REISHED. Ванильный Minecraft 26.2</div>
                <div class="footer-links">
                    <a href="https://discord.gg/RZa2AQheQ4" target="_blank">Discord</a>
                    <a href="#" onclick="copyIP(); return false">reished.my-craft.cc</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script>
        // Проверка прав админа
        const currentUser = JSON.parse(localStorage.getItem('reished_user') || 'null');
        
        if (!currentUser || currentUser.role !== 'admin') {
            alert('⛔ Доступ запрещён! Эта страница только для администраторов.');
            window.location.href = 'index.html';
        }

        // Отображение имени админа
        document.getElementById('adminName').textContent = currentUser.name;
        document.getElementById('adminPrefix').textContent = currentUser.prefix || 'Администратор';

        // Переключение вкладок
        function switchTab(tabName) {
            document.querySelectorAll('.admin-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.admin-section').forEach(section => section.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
        }

        // Загрузка игроков
        function loadAdminPlayers() {
            const players = JSON.parse(localStorage.getItem('reished_players') || '[]');
            const tbody = document.getElementById('adminPlayersTable');
            
            tbody.innerHTML = players.map(player => `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div class="avatar" style="width: 40px; height: 40px; font-size: 14px;">
                                ${player.name.slice(0, 2).toUpperCase()}
                            </div>
                            <div>
                                <div style="font-weight: 700;">${player.name}</div>
                                <div style="font-size: 12px; color: var(--text-soft);">${player.email || '—'}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span class="player-prefix prefix-${player.role || 'player'}">
                            ${player.prefix || (player.role === 'admin' ? 'Админ' : player.role === 'vip' ? 'VIP' : 'Игрок')}
                        </span>
                    </td>
                    <td>${player.banned ? '<span style="color: var(--danger);">⛔ Забанен</span>' : '<span style="color: var(--success);">✅ Активен</span>'}</td>
                    <td style="font-size: 13px; color: var(--text-soft);">
                        ${player.playtime || 0}ч · ${player.kills || 0} убийств
                    </td>
                    <td>
                        <div class="admin-actions">
                            ${player.role !== 'admin' ? `
                                <button class="btn-admin btn-admin-primary" onclick="makeAdmin(${player.id})">
                                    Сделать админом
                                </button>
                            ` : ''}
                            ${player.role === 'admin' && player.id !== currentUser.id ? `
                                <button class="btn-admin btn-admin-danger" onclick="removeAdmin(${player.id})">
                                    Снять админа
                                </button>
                            ` : ''}
                            <button class="btn-admin ${player.banned ? 'btn-admin-success' : 'btn-admin-danger'}" onclick="toggleBan(${player.id})">
                                ${player.banned ? 'Разбанить' : 'Забанить'}
                            </button>
                            <button class="btn-admin btn-admin-danger" onclick="deletePlayer(${player.id})">
                                Удалить
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');

            // Обновление статистики
            document.getElementById('statTotalPlayers').textContent = players.length;
            document.getElementById('statAdmins').textContent = players.filter(p => p.role === 'admin').length;
            document.getElementById('statVIPs').textContent = players.filter(p => p.role === 'vip').length;
        }

        // Назначить админом
        function makeAdmin(playerId) {
            const players = JSON.parse(localStorage.getItem('reished_players') || '[]');
            const player = players.find(p => p.id === playerId);
            
            if (confirm(`Назначить ${player.name} администратором?`)) {
                player.role = 'admin';
                player.prefix = 'Админ';
                localStorage.setItem('reished_players', JSON.stringify(players));
                loadAdminPlayers();
                showToast('success', 'Роль изменена', `${player.name} теперь администратор`);
            }
        }

        // Снять админа
        function removeAdmin(playerId) {
            const players = JSON.parse(localStorage.getItem('reished_players') || '[]');
            const player = players.find(p => p.id === playerId);
            
            if (confirm(`Снять администраторские права с ${player.name}?`)) {
                player.role = 'player';
                player.prefix = 'Игрок';
                localStorage.setItem('reished_players', JSON.stringify(players));
                loadAdminPlayers();
                showToast('success', 'Роль изменена', `${player.name} больше не администратор`);
            }
        }

        // Бан/разбан
        function toggleBan(playerId) {
            const players = JSON.parse(localStorage.getItem('reished_players') || '[]');
            const player = players.find(p => p.id === playerId);
            
            if (confirm(`${player.banned ? 'Разбанить' : 'Забанить'} ${player.name}?`)) {
                player.banned = !player.banned;
                localStorage.setItem('reished_players', JSON.stringify(players));
                loadAdminPlayers();
                showToast('success', 'Статус изменён', `${player.name} ${player.banned ? 'забанен' : 'разбанен'}`);
            }
        }

        // Удалить игрока
        function deletePlayer(playerId) {
            const players = JSON.parse(localStorage.getItem('reished_players') || '[]');
            const player = players.find(p => p.id === playerId);
            
            if (confirm(`Удалить игрока ${player.name}? Это действие нельзя отменить!`)) {
                const newPlayers = players.filter(p => p.id !== playerId);
                localStorage.setItem('reished_players', JSON.stringify(newPlayers));
                loadAdminPlayers();
                showToast('success', 'Игрок удалён', `${player.name} удалён с сервера`);
            }
        }

        // Загрузка жалоб
        function loadComplaints() {
            const complaints = JSON.parse(localStorage.getItem('reished_complaints') || '[]');
            const list = document.getElementById('complaintsList');
            
            document.getElementById('statComplaints').textContent = complaints.filter(c => c.status === 'new').length;
            
            if (complaints.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: var(--text-soft); padding: 40px;">Жалоб пока нет</p>';
                return;
            }

            list.innerHTML = complaints.map(comp => `
                <div class="complaint-card">
                    <div class="complaint-header">
                        <span class="complaint-reason">${comp.reason}</span>
                        <span style="font-size: 12px; color: var(--text-soft);">
                            ${comp.status === 'new' ? ' Новая' : '✅ Рассмотрена'}
                        </span>
                    </div>
                    <div class="complaint-user">Нарушитель: ${comp.user}</div>
                    <div class="complaint-text">${comp.text}</div>
                    <div class="complaint-date">
                        📅 ${new Date(comp.date).toLocaleString('ru-RU')}
                    </div>
                    <div class="complaint-actions">
                        <button class="btn-admin btn-admin-success" onclick="resolveComplaint(${comp.id})">
                            Рассмотрена
                        </button>
                        <button class="btn-admin btn-admin-danger" onclick="deleteComplaint(${comp.id})">
                            Удалить
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function resolveComplaint(compId) {
            const complaints = JSON.parse(localStorage.getItem('reished_complaints') || '[]');
            const comp = complaints.find(c => c.id === compId);
            comp.status = 'resolved';
            localStorage.setItem('reished_complaints', JSON.stringify(complaints));
            loadComplaints();
            showToast('success', 'Жалоба рассмотрена', '');
        }

        function deleteComplaint(compId) {
            const complaints = JSON.parse(localStorage.getItem('reished_complaints') || '[]');
            const newComplaints = complaints.filter(c => c.id !== compId);
            localStorage.setItem('reished_complaints', JSON.stringify(newComplaints));
            loadComplaints();
            showToast('success', 'Жалоба удалена', '');
        }

        function logout() {
            localStorage.removeItem('reished_user');
            window.location.href = 'index.html';
        }

        // Инициализация
        loadAdminPlayers();
        loadComplaints();
    </script>
</body>
</html>
