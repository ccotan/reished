<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — REISHED</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-card { max-width: 600px; margin: 40px auto; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; }
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--accent-grad); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; color: #121212; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; }
        .stat-row span:last-child { font-weight: 700; color: var(--accent); }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo"><div class="logo-cube"></div><span>REISHED</span></a>
            <nav class="nav">
                <a href="index.html" class="nav-link">Главная</a>
                <a href="server.html" class="nav-link">Сервер</a>
                <a href="players.html" class="nav-link">Игроки</a>
                <a href="profile.html" class="nav-link active">Профиль</a>
            </nav>
            <div class="header-right">
                <button class="theme-toggle" id="themeToggle">🌓</button>
                <button class="btn btn-ghost" onclick="logout()">Выйти</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="profile-card" id="profileCard">
            <div class="profile-header">
                <div class="profile-avatar" id="pAvatar">?</div>
                <div>
                    <h2 id="pName" style="font-size: 24px; font-weight: 800;">Гость</h2>
                    <span class="badge" id="pRole">Не авторизован</span>
                </div>
            </div>
            
            <h3 style="margin-bottom: 16px; font-size: 18px;">Статистика</h3>
            <div class="stat-row"><span>Время в игре</span><span id="pPlaytime">0 ч</span></div>
            <div class="stat-row"><span>Убийств</span><span id="pKills">0</span></div>
            <div class="stat-row"><span>Сварено пива</span><span id="pBrews">0</span></div>
            
            <button class="btn btn-primary" style="width: 100%; margin-top: 24px; justify-content: center;" onclick="alert('Редактирование будет доступно после подключения БД')">Редактировать профиль</button>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <div>© 2026 REISHED. Версия 26.2</div>
            <div class="footer-links">
                <a href="https://discord.gg/RZa2AQheQ4" target="_blank">Discord</a>
                <a href="#" onclick="copyIP(); return false;">IP: reished.my-craft.cc</a>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('reished_user'));
        if (!user) {
            window.location.href = 'auth.html';
        } else {
            document.getElementById('pName').textContent = user.username;
            document.getElementById('pAvatar').textContent = user.username.slice(0, 2).toUpperCase();
            document.getElementById('pRole').textContent = user.role === 'admin' ? 'Администратор' : (user.role === 'vip' ? 'VIP' : 'Игрок');
            if (user.role === 'admin') document.getElementById('pRole').classList.add('admin');
            
            // Демо-статистика
            document.getElementById('pPlaytime').textContent = '42 ч';
            document.getElementById('pKills').textContent = '15';
            document.getElementById('pBrews').textContent = '8';
        }

        function logout() {
            localStorage.removeItem('reished_user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
